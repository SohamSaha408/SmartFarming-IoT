[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.4
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit Unified Sensor@^1.1.13
    ; OTA — both libs ship with the ESP32 Arduino core, listed for clarity
    ; Update — HTTPClient and HTTPUpdate are bundled in espressif32 core

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; OTA: set your server base URL and the device's DB UUID here at build time
    ; Override these in your CI/CD or use platformio's extra_scripts to inject them
    -DOTA_SERVER_URL=\"http://YOUR_SERVER_IP:3000\"
    -DOTA_DEVICE_DB_ID=\"YOUR_DEVICE_UUID_FROM_DB\"
    -DOTA_CURRENT_VERSION=\"1.0.0\"

upload_speed = 921600
monitor_filters = esp32_exception_decoder
